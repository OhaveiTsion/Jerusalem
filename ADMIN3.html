<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Ohavei Tsion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap');
        :root { --bg-deep-blue: #0f34a1; --gold-border: #f1c40f; --card-blue: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg-deep-blue); color: white; padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        #toolbar { position: fixed; top: 70px; left: 50%; transform: translateX(-50%); display: none; background: #1a1a1a; padding: 10px; border-radius: 50px; border: 2px solid var(--gold-border); z-index: 9999; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .admin-nav { position: sticky; top: 0; z-index: 2000; width: 100%; max-width: 500px; display: flex; gap: 10px; padding: 10px 0; background: var(--bg-deep-blue); }
        .main-container { border: 3px solid var(--gold-border); border-radius: 20px; padding: 15px; width: 100%; max-width: 500px; background: linear-gradient(to bottom, #0f34a1, #0a2472); min-height: 80vh; display: flex; flex-direction: column; }
        
        .editable { background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2); padding: 4px; border-radius: 6px; outline: none; min-height: 1.2em; }
        .editable:focus { border: 1px solid var(--gold-border); background: rgba(255,255,255,0.1); }
        .editable * { background-color: transparent !important; background: transparent !important; color: inherit !important; }

        .section-card { border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 15px; background: var(--card-blue); margin-bottom: 10px; }
        .section-title { font-size: 1.25rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .title-underline { width: 40px; height: 3px; background-color: var(--gold-border); margin-top: 4px; border-radius: 2px; }
        .row-major { display: flex; justify-content: space-between; align-items: center; padding: 8px; }
        .f-btn { font-size: 10px; font-weight: bold; padding: 5px 12px; border-radius: 20px; background: #333; color: white; }
    </style>
</head>
<body>
    <div class="admin-nav">
        <button onclick="location.reload()" class="flex-1 bg-blue-600 p-3 rounded-xl font-bold text-white text-xs">🔄 ACTU</button>
        <button onclick="sendData()" class="flex-[2] bg-green-600 p-3 rounded-xl font-black text-white text-lg">🚀 ENVOYER</button>
    </div>

    <div id="toolbar">
        <button class="f-btn" onmousedown="event.preventDefault(); document.execCommand('bold')">GRAS</button>
        <button class="f-btn text-red-500" onmousedown="event.preventDefault(); document.execCommand('foreColor', false, '#ff4d4d')">ROUGE</button>
        <button class="f-btn" onmousedown="event.preventDefault(); document.execCommand('removeFormat')">NORMAL</button>
    </div>

    <div class="main-container">
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="bg-white rounded-xl p-2 text-blue-900 text-center flex flex-col justify-center">
                <p class="text-[10px] font-bold uppercase mb-1">Shabbat</p>
                <div id="parasha_val" class="editable text-lg font-bold" contenteditable="true"></div>
                <div id="auto-hint" class="text-[9.5px] mt-2 opacity-70 leading-tight"></div>
            </div>
            <div class="bg-white rounded-xl p-2 text-blue-900 text-center flex flex-col justify-center">
                <div id="allumage_bougies_label" class="editable text-[10px] font-bold text-red-500 uppercase mb-1" contenteditable="true">Allumage</div>
                <div id="allumage_bougies_val" class="editable text-2xl font-bold text-red-600" contenteditable="true">--:--</div>
                <div id="hint-allumage" class="text-[9.5px] mt-2 opacity-70 leading-tight"></div>
            </div>
        </div>

        <div class="section-card text-center">
            <div id="annonce_titre_val" class="editable text-xs italic opacity-60" contenteditable="true" placeholder="Titre Annonce"></div>
            <div id="annonce_texte_val" class="editable text-lg font-bold mt-2" contenteditable="true" placeholder="Texte Annonce"></div>
        </div>

        <button onclick="addZone()" class="w-full bg-white/10 border border-dashed p-2 rounded-lg text-xs font-bold mb-4 uppercase hover:bg-white/20 transition">+ AJOUTER ZONE</button>
        <div id="extra-sections"></div>

        <div class="section-card">
            <div class="section-title">SHABBAT<div class="title-underline"></div></div>
            <div class="space-y-1 mt-4">
                <div class="row-major"><div id="minha_vendredi_label" class="editable text-sm flex-1" contenteditable="true">Minha Vendredi</div><div id="minha_vendredi_val" class="editable text-xl font-bold ml-2" contenteditable="true">--:--</div></div>
                <div class="row-major border-t border-white/10 pt-1"><div id="chaharit_shabbat_label" class="editable text-sm flex-1" contenteditable="true">Shaharit</div><div id="chaharit_shabbat_val" class="editable text-xl font-bold ml-2" contenteditable="true">--:--</div></div>
                
                <div class="bg-black/20 rounded-lg p-2 my-2 text-xs space-y-2">
                    <div class="flex justify-between items-center"><div id="shiour_dan_label" class="editable flex-1" contenteditable="true">Dan Chemla</div><div id="shiour_dan_val" class="editable font-bold ml-2" contenteditable="true">--:--</div></div>
                    <div class="flex justify-between items-center"><div id="shiour_saadia_label" class="editable flex-1" contenteditable="true">Saadia Khalfon</div><div id="shiour_saadia_val" class="editable font-bold ml-2" contenteditable="true">--:--</div></div>
                    <div class="flex justify-between items-center"><div id="shiour_haviv_label" class="editable flex-1" contenteditable="true">Rav Haviv</div><div id="shiour_haviv_val" class="editable font-bold ml-2" contenteditable="true">--:--</div></div>
                    <div class="flex justify-between items-center"><div id="shiour_guemara_label" class="editable flex-1" contenteditable="true">Guemara</div><div id="shiour_guemara_val" class="editable font-bold ml-2" contenteditable="true">--:--</div></div>
                </div>
                
                <div class="row-major border-t border-white/10 pt-1"><div id="minha_shabbat_label" class="editable text-sm flex-1" contenteditable="true">Minha / Seouda</div><div id="minha_shabbat_val" class="editable text-xl font-bold ml-2" contenteditable="true">--:--</div></div>
                <div class="row-major border-t border-white/10 pt-1 flex-col items-stretch">
                    <div class="flex justify-between items-center">
                        <div id="arvit_motsach_label" class="editable text-sm flex-1" contenteditable="true">Arvit Motsae</div>
                        <div id="arvit_motsach_val" class="editable text-xl font-bold ml-2" contenteditable="true">--:--</div>
                    </div>
                    <div id="hint-arvit" class="text-[9.5px] mt-1 opacity-70 text-right leading-tight"></div>
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">SEMAINE<div class="title-underline"></div></div>
            <div class="space-y-1 mt-4">
                <div class="row-major"><div id="chaharit_semaine_label" class="editable text-sm flex-1" contenteditable="true">Shaharit</div><div id="chaharit_semaine_val" class="editable text-xl font-bold ml-2" contenteditable="true">--:--</div></div>
                <div class="row-major border-t border-white/10 pt-1"><div id="minha_semaine_label" class="editable text-sm flex-1" contenteditable="true">Minha / Arvit</div><div id="minha_semaine_val" class="editable text-xl font-bold ml-2" contenteditable="true">--:--</div></div>
            </div>
        </div>
        
        <div class="w-full text-center mt-auto pt-6 pb-2">
            <p class="text-xs opacity-50 italic">© Greg u.</p>
        </div>
    </div>

    <script src="zmanim.js"></script>
    <script>
        const API_URL = "https://api-syna.gregyman.workers.dev/";
        const keys = ['allumage_bougies','minha_vendredi','chaharit_shabbat','shiour_dan','shiour_saadia','shiour_haviv','shiour_guemara','minha_shabbat','arvit_motsach','chaharit_semaine','minha_semaine','annonce_titre','annonce_texte','parasha'];
        
        // Utilitaire pour formater la date au format DD/MM/YY
        function getZmanimDate(daysToAdd) {
            const d = new Date();
            d.setDate(d.getDate() + (daysToAdd));
            return d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit', year: '2-digit' });
        }

        document.querySelectorAll('.editable').forEach(el => {
            el.addEventListener('paste', e => {
                e.preventDefault();
                const text = e.clipboardData.getData('text/plain');
                document.execCommand('insertText', false, text);
            });
        });

        function toTags(h) { 
            if(!h) return "";
            let temp = h.replace(/<(div|p|br|li)[^>]*>/gi, "\n").replace(/<\/(div|p|li)>/gi, "");
            temp = temp.replace(/<(b|strong)[^>]*>(.*?)<\/\1>/gi, "**$2**");
            temp = temp.replace(/<font color="[^"]*">(.*?)<\/font>/gi, "{r}$1{/r}");
            temp = temp.replace(/<[^>]*>/g, "");
            return temp.replace(/&nbsp;/g, " ").replace(/\u00A0/g, " ").replace(/[ ]{2,}/g, " ").replace(/\n\s*\n/g, "\n").trim(); 
        }

        function toHtml(t) { 
            if(!t) return "";
            return t.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/\{r\}(.*?)\{\/r\}/g, '<font color="#ff4d4d">$1</font>').replace(/\n/g, "<br>"); 
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL); 
                const data = await res.json();
                
                // Remplissage des champs depuis la base KV
                keys.forEach(k => { 
                    const vEl=document.getElementById(`${k}_val`), lEl=document.getElementById(`${k}_label`); 
                    if(vEl && data[k]) vEl.innerHTML=toHtml(data[k].valeur || "");
                    if(lEl && data[k]) lEl.innerHTML=toHtml(data[k].intitule || "");
                });

                if(data.extra_sections) data.extra_sections.forEach(s => addZone(s.title, s.rows));
                
                // --- SUGGESTION PARASHA ---
                const h = await (await fetch('https://www.hebcal.com/shabbat?cfg=json&city=IL-Jerusalem&lg=s')).json();
                let events = [];
                h.items.forEach(i => {
                    if (i.category === "parashat") events.push(`<b>${i.title.replace("Parashat ", "")}</b>`);
                });
                document.getElementById('auto-hint').innerHTML = events.length > 0 ? "<b>Suggéré :</b> " + events[0] : "";

                // --- SUGGESTION HORAIRES (ZMANIM.JS) ---
                // On cherche l'allumage pour vendredi (aujourd'hui ou prochain)
                const today = new Date().getDay();
                const daysUntilFriday = (5 - today + 7) % 7;
                const friKey = getZmanimDate(daysUntilFriday); 
                const satKey = getZmanimDate((6 - today + 7) % 7);

                if(typeof ZMANIM_TABLE !== 'undefined') {
                    const zFri = ZMANIM_TABLE[friKey];
                    const zSat = ZMANIM_TABLE[satKey];
                    
                    if(zFri && zFri.allumage) {
                        document.getElementById('hint-allumage').innerHTML = `<b>Suggéré :</b> ${zFri.allumage}`;
                    }
                    if(zSat && zSat.arvit) {
                        document.getElementById('hint-arvit').innerHTML = `<b>Suggéré :</b> ${zSat.arvit}`;
                    }
                }
            } catch(e) { console.error(e); }
        }

        async function sendData() {
            const pass = prompt("Mot de passe :"); if(!pass) return;
            const payload = {};
            keys.forEach(k => { 
                const vEl=document.getElementById(`${k}_val`), lEl=document.getElementById(`${k}_label`); 
                payload[k] = { intitule: lEl ? toTags(lEl.innerHTML) : k, valeur: vEl ? toTags(vEl.innerHTML) : "" }; 
            });
            const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ auth: pass, payload: payload }) });
            alert((await r.text()).includes("Succès") ? "🚀 Sauvegardé !" : "Erreur.");
        }
        window.onload = loadData;
    </script>
</body>
</html>
