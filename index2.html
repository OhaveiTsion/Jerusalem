<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohavei Tsion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap');
        :root { --bg-deep-blue: #0f34a1; --gold-border: #f1c40f; --card-blue: rgba(255, 255, 255, 0.08); }
        body { font-family: 'Assistant', sans-serif; background-color: var(--bg-deep-blue); color: white; padding: 10px; display: flex; justify-content: center; margin: 0; }
        
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: var(--bg-deep-blue); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 9999; transition: opacity 0.6s; }
        .loader-line { width: 150px; height: 3px; background: rgba(255,255,255,0.1); margin-top: 20px; position: relative; overflow: hidden; }
        .loader-line::after { content: ""; position: absolute; left: -100%; width: 100%; height: 100%; background: var(--gold-border); animation: load 1.5s infinite; }
        @keyframes load { 0% { left: -100%; } 100% { left: 100%; } }
        .loaded #splash-screen { opacity: 0; pointer-events: none; }

        .main-container { border: 3px solid var(--gold-border); border-radius: 20px; width: 100%; max-width: 500px; padding: 15px; background: linear-gradient(to bottom, #0f34a1, #0a2472); display: flex; flex-direction: column; }
        .zman-box { background: white; border-radius: 12px; color: #0f34a1; padding: 10px 5px; text-align: center; }
        .annonce-card { background: var(--card-blue); border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 20px; margin-bottom: 15px; text-align: center; position: relative; }
        .section-card { border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 15px; background: var(--card-blue); margin-bottom: 10px; }
        .section-title { font-size: 1.25rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; text-align: center; display: flex; flex-direction: column; align-items: center; margin-bottom: 15px; }
        .title-underline { width: 40px; height: 3px; background-color: var(--gold-border); margin-top: 4px; border-radius: 2px; }
        .row-major { display: flex; justify-content: space-between; align-items: center; padding: 8px; }
        .shiour-item { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 6px 0; display: flex; justify-content: space-between; font-size: 0.85rem; }
        .f-bold { font-weight: 800; } .f-red { color: #ff4d4d; }
    </style>
</head>
<body>
    <div id="splash-screen"><img src="https://ohavei-tsion.org/wp-content/uploads/2019/04/cropped-ohavei-logo-1.png" class="h-16"><div class="loader-line"></div></div>

    <div class="main-container">
        <div class="flex items-center mb-6 border-b border-white/10 pb-3">
            <img src="https://ohavei-tsion.org/wp-content/uploads/2019/04/cropped-ohavei-logo-1.png" class="h-8 bg-white p-1 rounded">
            <h1 class="ml-4 text-xl font-black italic uppercase">Ohavei Tsion</h1>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="zman-box">
                <p class="text-[10px] font-bold uppercase opacity-60">Shabbat</p>
                <p id="shabbat-name" class="text-lg font-bold">--</p>
            </div>
            <div class="zman-box">
                <p id="label-allumage_bougies" class="text-[10px] font-bold uppercase text-red-500">Allumage</p>
                <p id="sheet-allumage_bougies" class="text-2xl font-bold text-red-600">--:--</p>
            </div>
        </div>

        <div id="announcement-block" class="annonce-card" style="display:none">
            <span id="sheet-annonce_titre" class="block text-xs italic opacity-70 mb-1"></span>
            <div id="sheet-annonce_texte" class="text-lg font-bold"></div>
            <div class="title-underline mx-auto mt-3"></div>
        </div>

        <div id="extra-sections-container"></div>

        <div class="section-card">
            <div class="section-title">SHABBAT<div class="title-underline"></div></div>
            <div class="row-major"><span id="label-minha_vendredi">Minha Vendredi</span><span id="sheet-minha_vendredi" class="text-xl font-bold">--:--</span></div>
            <div class="row-major border-t border-white/10 pt-1"><span id="label-chaharit_shabbat">Shaharit</span><span id="sheet-chaharit_shabbat" class="text-xl font-bold">--:--</span></div>
            
            <div class="bg-black/20 rounded-lg p-3 my-2 space-y-1">
                <div id="box-dan" class="shiour-item"><span>Dan Chemla</span><span id="sheet-shiour_dan" class="font-bold">--:--</span></div>
                <div id="box-saadia" class="shiour-item"><span>Saadia Khalfon</span><span id="sheet-shiour_saadia" class="font-bold">--:--</span></div>
                <div id="box-haviv" class="shiour-item"><span>Rav Haviv</span><span id="sheet-shiour_haviv" class="font-bold">--:--</span></div>
                <div id="box-guemara" class="shiour-item border-none"><span>Guemara</span><span id="sheet-shiour_guemara" class="font-bold">--:--</span></div>
            </div>

            <div class="row-major border-t border-white/10 pt-1"><span id="label-minha_shabbat">Minha / Seouda</span><span id="sheet-minha_shabbat" class="text-xl font-bold">--:--</span></div>
            <div class="row-major border-t border-white/10 pt-1"><span id="label-arvit_motsach">Arvit Motsae</span><span id="sheet-arvit_motsach" class="text-xl font-bold">--:--</span></div>
        </div>

        <div class="section-card">
            <div class="section-title">SEMAINE<div class="title-underline"></div></div>
            <div class="row-major"><span>Shaharit</span><span id="sheet-chaharit_semaine" class="text-xl font-bold">--:--</span></div>
            <div class="row-major border-t border-white/10 pt-1"><span>Minha / Arvit</span><span id="sheet-minha_semaine" class="text-xl font-bold">--:--</span></div>
        </div>
    </div>

    <script>
        const API_URL = "https://api-syna.gregyman.workers.dev/";
        function format(t) { 
            if(!t) return "";
            return t.replace(/\*\*(.*?)\*\*/g, '<span class="f-bold">$1</span>').replace(/\{r\}(.*?)\{\/r\}/g, '<span class="f-red">$1</span>').replace(/\n/g, "<br>");
        }

        async function load() {
            try {
                const [hRes, sRes] = await Promise.all([
                    fetch('https://www.hebcal.com/shabbat?cfg=json&city=IL-Jerusalem&lg=s'),
                    fetch(API_URL)
                ]);
                const hData = await hRes.json();
                const sData = await sRes.json();

                // Shabbat / Parasha
                const pAuto = hData.items.find(i => i.category === "parashat" || i.category === "holiday")?.title.replace("Parashat ", "") || "--";
                const pMan = sData.parasha?.valeur;
                document.getElementById('shabbat-name').innerHTML = (pMan && pMan !== "--") ? format(pMan) : `<b>${pAuto}</b>`;

                // Champs Classiques
                const keys = ['allumage_bougies','minha_vendredi','chaharit_shabbat','shiour_dan','shiour_saadia','shiour_haviv','shiour_guemara','minha_shabbat','arvit_motsach','chaharit_semaine','minha_semaine'];
                keys.forEach(k => {
                    const el = document.getElementById(`sheet-${k}`);
                    if (el && sData[k]) {
                        el.innerHTML = format(sData[k].valeur);
                        // Cacher les shiourim vides
                        if (k.startsWith('shiour_') && (!sData[k].valeur || sData[k].valeur === "--:--")) {
                            document.getElementById(`box-${k.split('_')[1]}`).style.display = 'none';
                        } else if (k.startsWith('shiour_')) {
                            document.getElementById(`box-${k.split('_')[1]}`).style.display = 'flex';
                        }
                    }
                });

                // Annonces
                const aT = sData.annonce_titre?.valeur, aX = sData.annonce_texte?.valeur;
                const b = document.getElementById('announcement-block');
                if(aT || aX) {
                    b.style.display = 'block';
                    document.getElementById('sheet-annonce_titre').innerHTML = format(aT);
                    document.getElementById('sheet-annonce_texte').innerHTML = format(aX);
                    document.getElementById('sheet-annonce_titre').style.display = aT ? 'block' : 'none';
                    document.getElementById('sheet-annonce_texte').style.display = aX ? 'block' : 'none';
                } else { b.style.display = 'none'; }

                // Zones supplémentaires
                const container = document.getElementById('extra-sections-container');
                container.innerHTML = '';
                if(sData.extra_sections) {
                    sData.extra_sections.forEach(sec => {
                        const rows = sec.rows.map((r, i) => `<div class="row-major ${i>0?'border-t border-white/10 pt-1':''}"><span>${format(r.label)}</span><span class="text-xl font-bold">${format(r.val)}</span></div>`).join('');
                        container.insertAdjacentHTML('beforeend', `<div class="section-card"><div class="section-title">${sec.title}<div class="title-underline"></div></div>${rows}</div>`);
                    });
                }
                document.body.classList.add('loaded');
            } catch(e) { document.body.classList.add('loaded'); }
        }
        load(); setInterval(load, 30000);
    </script>
</body>
</html>
