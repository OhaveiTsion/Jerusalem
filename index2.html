<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ohavei Tsion</title>
    <link rel="preconnect" href="https://docs.google.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap');
        
        :root { 
            --bg-deep-blue: #0f34a1; 
            --gold-border: #f1c40f; 
            --card-blue: rgba(255, 255, 255, 0.08); 
        }

        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--bg-deep-blue); 
            color: white; padding: 10px; 
            display: flex; justify-content: center; margin: 0;
        }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-deep-blue);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            z-index: 9999; transition: opacity 0.6s ease-out;
        }
        .loader-line {
            width: 150px; height: 3px; background: rgba(255,255,255,0.1);
            margin-top: 20px; position: relative; overflow: hidden; border-radius: 2px;
        }
        .loader-line::after {
            content: ""; position: absolute; left: -100%; width: 100%; height: 100%;
            background: var(--gold-border); animation: loadingBar 1.5s infinite ease-in-out;
        }
        @keyframes loadingBar { 0% { left: -100%; } 50% { left: 0%; } 100% { left: 100%; } }
        .loaded #splash-screen { opacity: 0; pointer-events: none; }

        .main-container { 
            border: 3px solid var(--gold-border); border-radius: 20px; 
            min-height: calc(100vh - 20px); padding: 15px; 
            width: 100%; max-width: 500px; 
            background: linear-gradient(to bottom, #0f34a1, #0a2472);
            opacity: 0; transform: scale(0.98);
            transition: opacity 0.8s ease, transform 0.8s ease; display: flex; flex-direction: column;
        }
        .loaded .main-container { opacity: 1; transform: scale(1); }

        .zman-box { background: white; border-radius: 12px; color: #0f34a1; padding: 10px 5px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .annonce-card { background: var(--card-blue); border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 25px 15px 15px 15px; margin-bottom: 15px; display: none; position: relative; text-align: center; }
        .annonce-titre-style { position: absolute; top: 8px; left: 15px; font-size: 0.75rem; font-style: italic; opacity: 0.6; }
        
        .section-card { border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 15px; background: var(--card-blue); margin-bottom: 8px; }
        .section-title { font-size: 1.25rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; text-align: center; margin-bottom: 12px; display: flex; flex-direction: column; align-items: center; }
        .title-underline { width: 40px; height: 3px; background-color: var(--gold-border); margin-top: 4px; border-radius: 2px; }
        .row-major { display: flex; justify-content: space-between; align-items: center; padding: 10px 8px; }
        .shiour-item { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 6px 0; display: flex; justify-content: space-between; font-size: 0.85rem; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <img src="https://ohavei-tsion.org/wp-content/uploads/2019/04/cropped-ohavei-logo-1.png" class="h-20 w-auto rounded bg-white p-2">
        <div class="loader-line"></div>
    </div>

    <div class="main-container shadow-2xl">
        <div class="flex items-center mb-6 border-b border-white/10 pb-3">
            <div class="w-1/2 flex justify-center"><img src="https://ohavei-tsion.org/wp-content/uploads/2019/04/cropped-ohavei-logo-1.png" class="h-10 w-auto rounded bg-white p-1"></div>
            <div class="w-1/2 flex justify-center"><h1 class="text-xl font-black italic text-white uppercase">Ohavei Tsion</h1></div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="zman-box">
                <p class="text-[10px] opacity-60 mb-1">Parasha / Fête</p>
                <p id="parasha-display" class="text-lg leading-tight font-bold">--</p>
            </div>
            <div class="zman-box">
                <p id="label-allumage_bougies" class="text-[10px] mb-1 text-red-500">Allumage</p>
                <p id="sheet-allumage_bougies" class="text-2xl text-red-600 font-bold">--:--</p>
            </div>
        </div>

        <div id="announcement-block" class="annonce-card">
            <span id="sheet-annonce_titre" class="annonce-titre-style"></span>
            <div id="sheet-annonce_texte" class="text-xl mt-2 font-bold"></div>
            <div class="title-underline mt-3 mx-auto"></div>
        </div>

        <div id="extra-sections-container"></div>

        <div class="section-card">
            <div class="section-title">SHABBAT<div class="title-underline"></div></div>
            <div class="space-y-1">
                <div class="row-major"><span id="label-minha_vendredi">Minha Vendredi</span><span id="sheet-minha_vendredi" class="text-xl font-bold">--:--</span></div>
                <div class="row-major border-t border-white/10 pt-1"><span id="label-chaharit_shabbat">Shaharit</span><span id="sheet-chaharit_shabbat" class="text-xl font-bold">--:--</span></div>
                
                <div class="bg-black/20 rounded-lg p-3 my-2 space-y-1 border border-white/5">
                    <div class="shiour-item"><span id="label-shiour_dan">...</span><span id="sheet-shiour_dan" class="font-bold">--:--</span></div>
                    <div class="shiour-item"><span id="label-shiour_saadia">...</span><span id="sheet-shiour_saadia" class="font-bold">--:--</span></div>
                    <div class="shiour-item"><span id="label-shiour_haviv">...</span><span id="sheet-shiour_haviv" class="font-bold">--:--</span></div>
                    <div class="shiour-item border-none"><span id="label-shiour_guemara">...</span><span id="sheet-shiour_guemara" class="font-bold">--:--</span></div>
                </div>

                <div class="row-major border-t border-white/10 pt-1"><span id="label-minha_shabbat">Minha / Seouda</span><span id="sheet-minha_shabbat" class="text-xl font-bold">--:--</span></div>
                <div class="row-major border-t border-white/10 pt-1"><span id="label-arvit_motsach">Arvit Motsae</span><span id="sheet-arvit_motsach" class="text-xl font-bold">--:--</span></div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">SEMAINE<div class="title-underline"></div></div>
            <div class="space-y-1">
                <div class="row-major"><span id="label-chaharit_semaine">Shaharit</span><span id="sheet-chaharit_semaine" class="text-xl font-bold">--:--</span></div>
                <div class="row-major border-t border-white/10 pt-1"><span id="label-minha_semaine">Minha / Arvit</span><span id="sheet-minha_semaine" class="text-xl font-bold">--:--</span></div>
            </div>
        </div>

        <div class="mt-auto pt-4 text-center">
            <p class="text-[10px] opacity-30 italic">© Greg u.</p>
        </div>
    </div>

    <script>
        const API_URL = "https://api-syna.gregyman.workers.dev/";

        async function loadAll() {
            try {
                // 1. Logique Parasha / Fête depuis Hebcal
                const hRes = await fetch('https://www.hebcal.com/shabbat?cfg=json&city=IL-Jerusalem&lg=s');
                const hData = await hRes.json();
                let nameAuto = "--";
                const parashaEvent = hData.items.find(i => i.category === "parashat");
                
                if (parashaEvent) {
                    nameAuto = parashaEvent.title.replace("Parashat ", "");
                } else {
                    // S'il n'y a pas de parasha (ex: Shabbat de Fête), on cherche la fête
                    const holidayEvent = hData.items.find(i => i.category === "holiday");
                    if (holidayEvent) nameAuto = holidayEvent.title;
                }

                // 2. Chargement des données du Worker
                const sheetRes = await fetch(API_URL);
                const sData = await sheetRes.json();

                // Remplissage des champs classiques
                const keys = ['allumage_bougies', 'minha_vendredi', 'chaharit_shabbat', 'shiour_dan', 'shiour_saadia', 'shiour_haviv', 'shiour_guemara', 'minha_shabbat', 'arvit_motsach', 'chaharit_semaine', 'minha_semaine'];
                keys.forEach(k => {
                    const label = document.getElementById(`label-${k}`), val = document.getElementById(`sheet-${k}`);
                    if(label && sData[k]) label.innerText = sData[k].intitule;
                    if(val && sData[k]) val.innerText = sData[k].valeur;
                });

                // 3. Affichage Parasha (Manuel ou Auto)
                const pManuel = (sData.parasha && sData.parasha.valeur && sData.parasha.valeur.trim() !== "" && sData.parasha.valeur !== "--") ? sData.parasha.valeur : null;
                document.getElementById('parasha-display').innerText = pManuel || nameAuto;

                // 4. Gestion de l'Annonce (Indépendant)
                const aTitre = sData.annonce_titre ? sData.annonce_titre.valeur.trim() : "";
                const aTexte = sData.annonce_texte ? sData.annonce_texte.valeur.trim() : "";
                const blockAnnonce = document.getElementById('announcement-block');
                const spanTitre = document.getElementById('sheet-annonce_titre');
                const divTexte = document.getElementById('sheet-annonce_texte');

                if (aTitre === "" && aTexte === "") {
                    blockAnnonce.style.display = 'none';
                } else {
                    blockAnnonce.style.display = 'block';
                    spanTitre.innerText = aTitre;
                    spanTitre.style.display = aTitre === "" ? 'none' : 'block';
                    divTexte.innerText = aTexte;
                    divTexte.style.display = aTexte === "" ? 'none' : 'block';
                }

                // 5. Affichage des Zones Dynamiques (Fêtes)
                const extraContainer = document.getElementById('extra-sections-container');
                extraContainer.innerHTML = '';
                if (sData.extra_sections && sData.extra_sections.length > 0) {
                    sData.extra_sections.forEach(sec => {
                        let rowsHtml = '';
                        sec.rows.forEach((r, index) => {
                            const borderClass = index === 0 ? '' : 'border-t border-white/10 pt-1';
                            rowsHtml += `<div class="row-major ${borderClass}"><span class="text-sm">${r.label}</span><span class="text-xl font-bold">${r.val}</span></div>`;
                        });
                        extraContainer.insertAdjacentHTML('beforeend', `
                            <div class="section-card border-indigo-400">
                                <div class="section-title text-indigo-300">${sec.title}<div class="title-underline bg-indigo-400"></div></div>
                                <div class="space-y-1">${rowsHtml}</div>
                            </div>
                        `);
                    });
                }

                document.body.classList.add('loaded');
            } catch(e) { 
                console.error("Erreur:", e);
                document.body.classList.add('loaded');
            }
        }

        loadAll(); 
        setInterval(loadAll, 30000);
    </script>
</body>
</html>
