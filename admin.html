<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ohavei Tsion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-deep-blue: #0f34a1;
            --gold-border: #f1c40f;
            --card-blue: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--bg-deep-blue);
            color: white;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .admin-toolbar {
            width: 100%;
            max-width: 500px;
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        .btn-load { background: var(--gold-border); color: #0f34a1; }
        .btn-send { background: #2ecc71; color: white; }

        .main-container {
            border: 3px solid var(--gold-border);
            border-radius: 20px;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            background: linear-gradient(to bottom, #0f34a1, #0a2472);
        }

        input, textarea {
            background: rgba(255,255,255,0.05);
            border: 1px dashed rgba(255,255,255,0.2);
            color: white;
            border-radius: 5px;
            width: 100%;
            padding: 4px 8px;
            font-family: inherit;
        }
        
        input:focus, textarea:focus {
            outline: none;
            border-color: var(--gold-border);
            background: rgba(255,255,255,0.1);
        }

        .zman-box {
            background: white;
            border-radius: 12px;
            color: #0f34a1;
            padding: 10px 5px;
            text-align: center;
        }
        .zman-box input {
            color: #0f34a1;
            border: 1px dashed rgba(15, 52, 161, 0.2);
            text-align: center;
            background: transparent;
            font-weight: 800;
        }

        .annonce-card {
            background: var(--card-blue);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 20px 15px;
            margin-bottom: 15px;
            text-align: center;
        }

        .section-card {
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 15px;
            background: var(--card-blue);
            margin-bottom: 8px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.9);
        }

        .row-major {
            display: flex;
            flex-direction: column;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .row-label { font-size: 0.7rem; font-weight: 800; text-transform: uppercase; opacity: 0.6; margin-bottom: 2px; }

        .toolbar-mini { display: flex; gap: 4px; margin-bottom: 5px; justify-content: center; }
        .tool-btn { font-size: 0.65rem; background: rgba(255,255,255,0.1); padding: 2px 6px; border-radius: 4px; cursor: pointer; }

        .title-underline { width: 40px; height: 3px; background-color: var(--gold-border); margin: 4px auto; border-radius: 2px; }
    </style>
</head>
<body>

    <div class="admin-toolbar">
        <button onclick="loadData()" class="btn btn-load">🔄 Charger</button>
        <button onclick="sendData()" class="btn btn-send">🚀 Envoyer</button>
    </div>

    <div class="main-container">
        <div class="flex items-center mb-6 border-b border-white/10 pb-3">
            <div class="w-1/2 flex justify-center">
                <img src="https://ohavei-tsion.org/wp-content/uploads/2019/04/cropped-ohavei-logo-1.png" alt="Logo" class="h-10 w-auto rounded bg-white p-1">
            </div>
            <div class="w-1/2 flex justify-center">
                <h1 class="text-xl font-black italic tracking-tighter text-white uppercase">Console Admin</h1>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="zman-box opacity-50">
                <p class="text-[10px] font-extrabold uppercase mb-1">Parasha (Auto)</p>
                <p id="auto-paracha" class="text-lg font-black leading-tight">--</p>
            </div>
            <div class="zman-box">
                <p class="text-[10px] font-extrabold uppercase mb-1 text-red-500">Allumage des nerot</p>
                <input type="text" id="allumage_bougies" value="--:--">
            </div>
        </div>

        <div class="annonce-card">
            <div class="row-label text-center">Titre & Texte de l'annonce</div>
            <input type="text" id="annonce_titre" placeholder="Titre Info." class="mb-2 text-center italic">
            
            <div class="toolbar-mini">
                <span class="tool-btn" onclick="insertTag('**','**')">Gras</span>
                <span class="tool-btn" onclick="insertTag('{r}','{/r}')">Rouge</span>
                <span class="tool-btn" onclick="insertTag('~~','~~')">Barré</span>
            </div>
            <textarea id="annonce_texte" rows="3" class="text-center font-bold" placeholder="Message..."></textarea>
            <div class="title-underline mt-3"></div>
        </div>

        <div class="section-card">
            <div class="section-title">SHABBAT <div class="title-underline"></div></div>
            
            <div class="row-major">
                <span class="row-label">Minha Vendredi Soir</span>
                <input type="text" id="minha_vendredi">
            </div>
            
            <div class="row-major">
                <span class="row-label">Shaharit</span>
                <input type="text" id="chaharit_shabbat">
            </div>

            <div class="row-major">
                <span class="row-label">Kiddouche</span>
                <input type="text" id="kiddoush_shabbat">
            </div>

            <div class="bg-black/20 rounded-lg p-3 my-3 space-y-3">
                <div><span class="row-label">Shiour Dan Chemla</span><input type="text" id="shiour_dan"></div>
                <div><span class="row-label">Shiour Saadia Khalfon</span><input type="text" id="shiour_saadia"></div>
                <div><span class="row-label">Shiour Rav Haviv</span><input type="text" id="shiour_haviv"></div>
                <div><span class="row-label">Shiour Guemara</span><input type="text" id="shiour_guemara"></div>
            </div>

            <div class="row-major">
                <span class="row-label">Minha / Seouda Shlishit</span>
                <input type="text" id="minha_shabbat">
            </div>

            <div class="row-major border-none">
                <span class="row-label">Arvit Motsae Shabbat</span>
                <input type="text" id="arvit_motsach">
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">SEMAINE <div class="title-underline"></div></div>
            <div class="row-major">
                <span class="row-label">Shaharit</span>
                <input type="text" id="chaharit_semaine">
            </div>
            <div class="row-major border-none">
                <span class="row-label">Minha / Arvit</span>
                <input type="text" id="minha_semaine">
            </div>
        </div>
    </div>

    <script>
        // REMPLACE CETTE URL PAR TON URL APPS SCRIPT DÉPLOYÉE
        const API_URL = "https://script.google.com/macros/s/AKfycbz58h41PFAMaiZNWbYc6ess_v3SoJs2daMdA8vd93oE37w3O3mfAE34u1OT63_LF0N3/exec";

        const fieldIds = [
            'annonce_titre', 'annonce_texte', 'allumage_bougies', 
            'minha_vendredi', 'chaharit_shabbat', 'kiddoush_shabbat',
            'shiour_dan', 'shiour_saadia', 'shiour_haviv', 'shiour_guemara',
            'minha_shabbat', 'arvit_motsach', 'chaharit_semaine', 'minha_semaine'
        ];

        function insertTag(start, end) {
            const area = document.getElementById('annonce_texte');
            const s = area.selectionStart;
            const e = area.selectionEnd;
            const val = area.value;
            area.value = val.substring(0, s) + start + val.substring(s, e) + end + val.substring(e);
            area.focus();
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                fieldIds.forEach(id => {
                    if (data[id]) document.getElementById(id).value = data[id];
                });
                alert("Données chargées !");
            } catch(e) { alert("Erreur de chargement. Vérifie ton URL Apps Script."); }
        }

        async function sendData() {
            const payload = {};
            fieldIds.forEach(id => payload[id] = document.getElementById(id).value);

            try {
                await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                alert("Mise à jour réussie sur Google Sheet !");
            } catch(e) { alert("Erreur d'envoi."); }
        }
    </script>
</body>
</html>
