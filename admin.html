<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Ohavei Tsion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap');
        :root { --bg-blue: #0f34a1; --gold: #f1c40f; }
        body { font-family: 'Assistant', sans-serif; background: var(--bg-blue); color: white; padding: 10px; padding-bottom: 100px; }
        .main-container { border: 3px solid var(--gold); border-radius: 20px; padding: 15px; width: 100%; max-width: 600px; margin: auto; background: linear-gradient(to bottom, #0f34a1, #0a2472); position: relative; }
        .btn { padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; border: none; flex: 1; }
        .section-card { border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 15px; background: rgba(255,255,255,0.08); margin-bottom: 15px; }
        
        .editable { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: white; 
            border-radius: 8px; 
            padding: 10px; 
            min-height: 42px;
            outline: none;
            transition: all 0.2s;
        }
        .editable:focus { border-color: var(--gold); background: rgba(255,255,255,0.2); }
        .val-input { min-width: 160px !important; font-weight: 800; text-align: center; } 
        
        .row-edit { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; }
        label { font-size: 0.7rem; text-transform: uppercase; color: var(--gold); font-weight: 800; opacity: 0.7; margin-bottom: 4px; display: block; }

        /* BARRE DE FORMATAGE FLOTTANTE */
        #floating-toolbar {
            position: absolute;
            display: none; /* Caché par défaut */
            background: #222;
            padding: 5px;
            border-radius: 8px;
            border: 1px solid var(--gold);
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            z-index: 1000;
            gap: 5px;
            transform: translate(-50%, -110%); /* Centré au-dessus */
        }
        .f-btn { font-size: 0.7rem; background: #444; color: white; padding: 4px 10px; border-radius: 4px; border: none; cursor: pointer; font-weight: 700; }
        .f-btn:hover { background: #666; }

        /* Styles internes à l'édition */
        .editable b { font-weight: 900; }
        .editable font[color="red"] { color: #ff4d4d; }
        .editable strike { text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="flex gap-3 max-w-[600px] mx-auto mb-6">
        <button onclick="loadData()" class="btn bg-yellow-500 text-blue-900 shadow-lg">🔄 CHARGER</button>
        <button onclick="sendData()" class="btn bg-green-500 text-white shadow-lg">🚀 ENVOYER</button>
    </div>

    <div id="floating-toolbar">
        <button class="f-btn" onmousedown="event.preventDefault(); exec('bold')">Gras</button>
        <button class="f-btn text-red-400" onmousedown="event.preventDefault(); exec('foreColor', '#ff4d4d')">Rouge</button>
        <button class="f-btn" onmousedown="event.preventDefault(); exec('strikeThrough')">Barré</button>
        <button class="f-btn" onmousedown="event.preventDefault(); exec('removeFormat')">Normal</button>
    </div>

    <div class="main-container shadow-2xl">
        <h1 class="text-center font-black text-2xl mb-8 text-yellow-400 italic uppercase">Console Admin</h1>
        <div id="admin-content"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwpTN2pu6rJ8bFa8EMHpJ6vxwxJpwPqRCrNOJqRKtQkp1M_govLnybxrSisayzxDLpm/exec";
        
        const sections = [
            { title: "ANNONCES", keys: ['annonce_titre', 'annonce_texte'] },
            { title: "SHABBAT", keys: ['allumage_bougies', 'minha_vendredi', 'chaharit_shabbat', 'kiddoush_shabbat', 'shiour_dan', 'shiour_saadia', 'shiour_haviv', 'shiour_guemara', 'minha_shabbat', 'arvit_motsach'] },
            { title: "SEMAINE", keys: ['chaharit_semaine', 'minha_semaine'] }
        ];

        function exec(cmd, val=null) { document.execCommand(cmd, false, val); }

        // Génération de l'interface sans boutons visibles
        const mainDiv = document.getElementById('admin-content');
        sections.forEach(sec => {
            let html = `<div class="section-card"><h2 class="text-center font-black mb-4 border-b border-white/10 pb-2">${sec.title}</h2>`;
            sec.keys.forEach(k => {
                const isAnnonce = k.startsWith('annonce');
                html += `
                <div class="row-edit">
                    <label>${k.replace('_', ' ')}</label>
                    ${isAnnonce ? 
                        `<div id="${k}_val" class="editable w-full" contenteditable="true"></div>` : 
                        `<div class="flex gap-3">
                            <div id="${k}_label" class="editable flex-1" contenteditable="true"></div>
                            <div id="${k}_val" class="editable val-input" contenteditable="true"></div>
                        </div>`
                    }
                </div>`;
            });
            html += `</div>`;
            mainDiv.innerHTML += html;
        });

        // GESTION DE LA BARRE FLOTTANTE
        const toolbar = document.getElementById('floating-toolbar');
        
        document.addEventListener('focusin', (e) => {
            if(e.target.classList.contains('editable')) {
                const rect = e.target.getBoundingClientRect();
                toolbar.style.display = 'flex';
                // Calcul de la position : centré au dessus du champ
                toolbar.style.top = (window.scrollY + rect.top) + 'px';
                toolbar.style.left = (rect.left + rect.width / 2) + 'px';
            }
        });

        document.addEventListener('focusout', (e) => {
            // Un petit délai pour permettre le clic sur le bouton avant de cacher
            setTimeout(() => {
                if (!document.activeElement.classList.contains('editable')) {
                    toolbar.style.display = 'none';
                }
            }, 100);
        });

        // FONCTIONS DE CONVERSION (Identiques à la version précédente)
        function htmlToTags(html) {
            if(!html) return "";
            let t = html.replace(/<b>(.*?)<\/b>/gi, "**$1**")
                        .replace(/<strong>(.*?)<\/strong>/gi, "**$1**")
                        .replace(/<font color="(.*?)">(.*?)<\/font>/gi, "{r}$2{/r}")
                        .replace(/<strike>(.*?)<\/strike>/gi, "~~$1~~")
                        .replace(/<div>/gi, "\n").replace(/<\/div>/gi, "")
                        .replace(/<br>/gi, "\n").replace(/&nbsp;/g, " ");
            let tmp = document.createElement("DIV");
            tmp.innerHTML = t;
            return tmp.textContent || tmp.innerText || "";
        }

        function tagsToHtml(tags) {
            if(!tags) return "";
            return tags.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
                       .replace(/\{r\}(.*?)\{\/r\}/g, '<font color="red">$1</font>')
                       .replace(/\~\~(.*?)\~\~/g, "<strike>$1</strike>")
                       .replace(/\n/g, "<br>");
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                sections.forEach(sec => {
                    sec.keys.forEach(k => {
                        if(data[k]) {
                            if(k.startsWith('annonce')) {
                                document.getElementById(`${k}_val`).innerHTML = tagsToHtml(data[k].valeur);
                            } else {
                                document.getElementById(`${k}_label`).innerHTML = tagsToHtml(data[k].intitule);
                                document.getElementById(`${k}_val`).innerHTML = tagsToHtml(data[k].valeur);
                            }
                        }
                    });
                });
                alert("✅ Chargement terminé !");
            } catch(e) { alert("❌ Erreur"); }
        }

        async function sendData() {
            const payload = {};
            sections.forEach(sec => {
                sec.keys.forEach(k => {
                    if(k.startsWith('annonce')) {
                        payload[k] = { intitule: k, valeur: htmlToTags(document.getElementById(`${k}_val`).innerHTML) };
                    } else {
                        payload[k] = { 
                            intitule: htmlToTags(document.getElementById(`${k}_label`).innerHTML), 
                            valeur: htmlToTags(document.getElementById(`${k}_val`).innerHTML) 
                        };
                    }
                });
            });
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("🚀 Données envoyées !");
        }
    </script>
</body>
</html>
