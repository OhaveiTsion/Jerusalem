<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ohavei Tsion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap');
        
        :root {
            --bg-deep-blue: #0f34a1;
            --gold-border: #f1c40f;
            --card-blue: rgba(255, 255, 255, 0.08);
        }

        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--bg-deep-blue);
            color: white;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Barre de contrôle en haut */
        .admin-toolbar {
            width: 100%;
            max-width: 500px;
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            font-weight: 800;
            text-transform: uppercase;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }
        .btn-load { background: var(--gold-border); color: #0f34a1; }
        .btn-send { background: #2ecc71; color: white; }

        .main-container {
            border: 3px solid var(--gold-border);
            border-radius: 20px;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            background: linear-gradient(to bottom, #0f34a1, #0a2472);
        }

        /* Style des inputs pour qu'ils se fondent dans le décor */
        input, textarea {
            background: rgba(255,255,255,0.1);
            border: 1px dashed rgba(255,255,255,0.3);
            color: white;
            border-radius: 5px;
            width: 100%;
            padding: 2px 5px;
            font-family: inherit;
        }
        
        /* Cas particulier : les boites blanches */
        .zman-box input {
            color: #0f34a1;
            border: 1px dashed rgba(15, 52, 161, 0.3);
            text-align: center;
            background: transparent;
        }

        .zman-box {
            background: white;
            border-radius: 12px;
            color: #0f34a1;
            padding: 10px 5px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .annonce-card {
            background: var(--card-blue);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 25px 15px 15px 15px;
            margin-bottom: 15px;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .section-card {
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 15px;
            padding: 15px;
            background: var(--card-blue);
            margin-bottom: 8px;
        }

        .section-title {
            font-size: 1.25rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            text-align: center;
            margin-bottom: 12px;
            color: rgba(255, 255, 255, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .row-major {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 8px;
        }

        .row-major input {
            width: 80px;
            text-align: right;
            font-weight: 900;
            font-size: 1.1rem;
        }

        .shiour-item {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 6px 0;
            display: flex;
            justify-content: space-between;
        }
        
        .shiour-item input { width: 70px; font-weight: 700; text-align: right; }

        .title-underline {
            width: 40px;
            height: 3px;
            background-color: var(--gold-border);
            margin-top: 4px;
            border-radius: 2px;
        }
    </style>
</head>
<body>

    <div class="admin-toolbar">
        <button onclick="loadData()" class="btn btn-load">🔄 Charger</button>
        <button onclick="sendData()" class="btn btn-send">🚀 Envoyer</button>
    </div>

    <div class="main-container">
        <div class="flex items-center mb-6 border-b border-white/10 pb-3">
            <div class="w-1/2 flex justify-center">
                <img src="https://ohavei-tsion.org/wp-content/uploads/2019/04/cropped-ohavei-logo-1.png" alt="Logo" class="h-10 w-auto rounded bg-white p-1">
            </div>
            <div class="w-1/2 flex justify-center">
                <h1 class="text-xl font-black italic tracking-tighter text-white uppercase">CONSOLE ADMIN</h1>
            </div>
        </div>

        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="zman-box">
                <p class="text-[10px] font-extrabold uppercase opacity-60 mb-1">Parasha (Auto)</p>
                <p id="auto-paracha" class="text-lg font-black leading-tight">--</p>
            </div>
            <div class="zman-box">
                <p class="text-[10px] font-extrabold uppercase mb-1 text-red-500">Allumage des nerot</p>
                <input type="text" id="allumage_bougies" class="text-2xl font-black text-red-600" value="--:--">
            </div>
        </div>

        <div class="annonce-card">
            <input type="text" id="annonce_titre" placeholder="Titre (ex: MAZAL TOV)" class="text-xs italic font-semibold opacity-70 mb-2">
            <textarea id="annonce_texte" placeholder="Votre annonce ici..." rows="3" class="text-lg font-extrabold text-center"></textarea>
            <div class="title-underline mt-3"></div>
        </div>

        <div class="section-card">
            <div class="section-title">SHABBAT <div class="title-underline"></div></div>
            <div class="space-y-1">
                <div class="row-major">
                    <span class="font-black text-[0.85rem] uppercase">Minha Vendredi</span>
                    <input type="text" id="minha_vendredi">
                </div>
                <div class="row-major border-t border-white/10 pt-1">
                    <span class="font-black text-[0.85rem] uppercase">Shaharit</span>
                    <input type="text" id="chaharit_shabbat">
                </div>
                
                <div class="bg-black/20 rounded-lg p-3 my-2 space-y-1 border border-white/5">
                    <div class="shiour-item"><span>Shiour 1</span><input type="text" id="shiour_dan"></div>
                    <div class="shiour-item"><span>Shiour 2</span><input type="text" id="shiour_saadia"></div>
                    <div class="shiour-item"><span>Shiour 3</span><input type="text" id="shiour_haviv"></div>
                    <div class="shiour-item border-none"><span>Shiour 4</span><input type="text" id="shiour_guemara"></div>
                </div>

                <div class="row-major border-t border-white/10 pt-1">
                    <span class="font-black text-[0.85rem] uppercase">Minha Shabbat</span>
                    <input type="text" id="minha_shabbat">
                </div>

                <div class="row-major border-t border-white/20 pt-1">
                    <span class="font-black text-[0.85rem] uppercase">Arvit Motsach</span>
                    <input type="text" id="arvit_motsach">
                </div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">SEMAINE <div class="title-underline"></div></div>
            <div class="space-y-1">
                <div class="row-major">
                    <span class="font-black text-[0.85rem] uppercase">Shaharit</span>
                    <input type="text" id="chaharit_semaine">
                </div>
                <div class="row-major border-t border-white/20 pt-1">
                    <span class="font-black text-[0.85rem] uppercase">Minha / Arvit</span>
                    <input type="text" id="minha_semaine">
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz4l4ZazkVSzrQMTA6RaX87ha2VzUGbEDEdsyNNck079iMwIdwzK8wu6vY-SA9y09Ql/exec"; // <--- REMPLACE PAR TON URL

        const fieldIds = [
            'allumage_bougies', 'annonce_titre', 'annonce_texte', 
            'minha_vendredi', 'chaharit_shabbat', 'minha_shabbat', 
            'arvit_motsach', 'chaharit_semaine', 'minha_semaine',
            'shiour_dan', 'shiour_saadia', 'shiour_haviv', 'shiour_guemara'
        ];

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                fieldIds.forEach(id => {
                    if (data[id]) document.getElementById(id).value = data[id];
                });
                alert("Données récupérées !");
            } catch(e) { alert("Erreur de chargement"); }
        }

        async function sendData() {
            const payload = {};
            fieldIds.forEach(id => {
                payload[id] = document.getElementById(id).value;
            });

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });
                alert("Mise à jour réussie !");
            } catch(e) { alert("Erreur lors de l'envoi"); }
        }
    </script>
</body>
</html>
