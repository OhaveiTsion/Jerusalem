<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Ohavei Tsion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap');
        :root { --bg-blue: #0f34a1; --gold: #f1c40f; }
        body { font-family: 'Assistant', sans-serif; background: var(--bg-blue); color: white; padding: 10px; }
        .main-container { border: 3px solid var(--gold); border-radius: 20px; padding: 15px; width: 100%; max-width: 550px; margin: auto; background: linear-gradient(to bottom, #0f34a1, #0a2472); }
        .btn { padding: 12px; border-radius: 10px; font-weight: 800; cursor: pointer; border: none; flex: 1; }
        .section-card { border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 15px; background: rgba(255,255,255,0.08); margin-bottom: 15px; }
        
        /* Styles des zones éditables */
        .editable { 
            background: rgba(255,255,255,0.1); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: white; 
            border-radius: 6px; 
            padding: 8px; 
            min-height: 40px;
            outline: none;
        }
        .editable:focus { border-color: var(--gold); background: rgba(255,255,255,0.15); }
        .val-input { width: 150px !important; font-weight: 800; text-align: center; } /* Élargi pour "07:00 (hodou)" */
        
        .row-edit { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .controls { display: flex; gap: 5px; margin-bottom: 5px; }
        .f-btn { font-size: 0.7rem; background: #333; padding: 4px 8px; border-radius: 4px; cursor: pointer; border: 1px solid #555; }
        .f-btn:hover { background: #555; }
        label { font-size: 0.65rem; text-transform: uppercase; color: var(--gold); font-weight: 800; }

        /* Styles internes à l'édition */
        .editable b { font-weight: bold; }
        .editable font[color="red"] { color: #ff4d4d; }
        .editable strike { text-decoration: line-through; }
    </style>
</head>
<body>

    <div class="flex gap-2 max-w-[550px] mx-auto mb-4">
        <button onclick="loadData()" class="btn bg-yellow-500 text-blue-900">🔄 CHARGER</button>
        <button onclick="sendData()" class="btn bg-green-500 text-white">🚀 ENVOYER AU SHEET</button>
    </div>

    <div class="main-container">
        <h1 class="text-center font-black text-xl mb-6 text-yellow-400 italic">CONSOLE ADMIN</h1>

        <div class="section-card">
            <h2 class="text-center font-black mb-4 underline">ANNONCES</h2>
            <div class="row-edit">
                <label>Titre / Texte de l'annonce</label>
                <div class="controls">
                    <button class="f-btn" onclick="exec('bold')"><b>B</b></button>
                    <button class="f-btn text-red-500" onclick="exec('foreColor', '#ff4d4d')">Rouge</button>
                    <button class="f-btn" onclick="exec('strikeThrough')"><s>S</s></button>
                    <button class="f-btn" onclick="exec('removeFormat')">CLR</button>
                </div>
                <div id="annonce_titre_val" class="editable mb-2" contenteditable="true"></div>
                <div id="annonce_texte_val" class="editable" contenteditable="true" style="min-height: 80px;"></div>
            </div>
        </div>

        <div id="dynamic-sections"></div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbwpTN2pu6rJ8bFa8EMHpJ6vxwxJpwPqRCrNOJqRKtQkp1M_govLnybxrSisayzxDLpm/exec";
        
        const keys = {
            "SHABBAT": ['allumage_bougies', 'minha_vendredi', 'chaharit_shabbat', 'kiddoush_shabbat', 'shiour_dan', 'shiour_saadia', 'shiour_haviv', 'shiour_guemara', 'minha_shabbat', 'arvit_motsach'],
            "SEMAINE": ['chaharit_semaine', 'minha_semaine']
        };

        function exec(cmd, val=null) { document.execCommand(cmd, false, val); }

        // Génération de l'interface
        const container = document.getElementById('dynamic-sections');
        for (let section in keys) {
            let html = `<div class="section-card"><h2 class="text-center font-black mb-4 underline">${section}</h2>`;
            keys[section].forEach(k => {
                html += `
                <div class="row-edit">
                    <label>${k.replace('_', ' ')}</label>
                    <div class="flex gap-2 mt-1">
                        <div id="${k}_label" class="editable flex-1" contenteditable="true"></div>
                        <div id="${k}_val" class="editable val-input" contenteditable="true"></div>
                    </div>
                </div>`;
            });
            html += `</div>`;
            container.innerHTML += html;
        }

        // Conversion HTML vers Balises (Gras -> **, Rouge -> {r})
        function htmlToTags(html) {
            let t = html.replace(/<b>(.*?)<\/b>/gi, "**$1**")
                        .replace(/<strong>(.*?)<\/strong>/gi, "**$1**")
                        .replace(/<font color="(.*?)">(.*?)<\/font>/gi, "{r}$2{/r}")
                        .replace(/<strike>(.*?)<\/strike>/gi, "~~$1~~")
                        .replace(/<div>/gi, "\n").replace(/<\/div>/gi, "")
                        .replace(/<br>/gi, "\n");
            let tmp = document.createElement("DIV");
            tmp.innerHTML = t;
            return tmp.textContent || tmp.innerText || "";
        }

        // Conversion Balises vers HTML (inverse)
        function tagsToHtml(tags) {
            if(!tags) return "";
            return tags.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>")
                       .replace(/\{r\}(.*?)\{\/r\}/g, '<font color="red">$1</font>')
                       .replace(/\~\~(.*?)\~\~/g, "<strike>$1</strike>")
                       .replace(/\n/g, "<br>");
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                document.getElementById('annonce_titre_val').innerHTML = tagsToHtml(data.annonce_titre?.valeur);
                document.getElementById('annonce_texte_val').innerHTML = tagsToHtml(data.annonce_texte?.valeur);
                
                Object.values(keys).flat().forEach(k => {
                    if(data[k]) {
                        document.getElementById(`${k}_label`).innerHTML = tagsToHtml(data[k].intitule);
                        document.getElementById(`${k}_val`).innerHTML = tagsToHtml(data[k].valeur);
                    }
                });
                alert("Données chargées !");
            } catch(e) { alert("Erreur chargement"); }
        }

        async function sendData() {
            const payload = {
                annonce_titre: { intitule: "Annonce Titre", valeur: htmlToTags(document.getElementById('annonce_titre_val').innerHTML) },
                annonce_texte: { intitule: "Annonce Texte", valeur: htmlToTags(document.getElementById('annonce_texte_val').innerHTML) }
            };
            Object.values(keys).flat().forEach(k => {
                payload[k] = {
                    intitule: htmlToTags(document.getElementById(`${k}_label`).innerHTML),
                    valeur: htmlToTags(document.getElementById(`${k}_val`).innerHTML)
                };
            });
            await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
            alert("Sheet mis à jour !");
        }
    </script>
</body>
</html>
