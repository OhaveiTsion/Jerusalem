<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Ohavei Tsion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap');
        body { font-family: 'Assistant', sans-serif; background: #0f34a1; color: white; padding: 15px; }
        .admin-container { max-width: 500px; margin: auto; border: 2px solid #f1c40f; border-radius: 20px; padding: 20px; background: rgba(255,255,255,0.05); }
        label { display: block; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; color: #f1c40f; margin-top: 15px; }
        input, textarea { width: 100%; background: white; color: #0f34a1; border-radius: 10px; padding: 10px; margin-top: 5px; font-weight: 600; border: none; }
        .toolbar { display: flex; gap: 5px; margin-top: 5px; }
        .tool-btn { background: rgba(255,255,255,0.2); font-size: 0.7rem; padding: 4px 8px; border-radius: 5px; cursor: pointer; }
        .btn-main { width: 100%; padding: 15px; border-radius: 12px; font-weight: 800; text-transform: uppercase; margin-top: 20px; transition: 0.3s; }
        .btn-load { background: #f1c40f; color: #0f34a1; }
        .btn-send { background: #2ecc71; color: white; }
    </style>
</head>
<body>
    <div class="admin-container">
        <h1 class="text-xl font-black text-center italic text-white uppercase mb-4">Console Admin</h1>
        
        <button onclick="loadFromSheet()" class="btn-main btn-load">🔄 Charger les données</button>

        <div id="fields">
            <label>Titre de l'annonce</label>
            <input type="text" id="annonce_titre">

            <label>Texte de l'annonce</label>
            <div class="toolbar">
                <span class="tool-btn" onclick="insertTag('**', '**')"><b>Gras</b></span>
                <span class="tool-btn" onclick="insertTag('{r}', '{/r}')"><span class="text-red-400">Rouge</span></span>
                <span class="tool-btn" onclick="insertTag('~~', '~~')"><del>Barré</del></span>
            </div>
            <textarea id="annonce_texte" rows="4"></textarea>

            <label>Allumage Bougies</label>
            <input type="text" id="allumage_bougies">

            <label>Minha Vendredi</label>
            <input type="text" id="minha_vendredi">
            
            <label>Arvit Motsae Shabbat</label>
            <input type="text" id="arvit_motsach">
        </div>

        <button onclick="sendToSheet()" class="btn-main btn-send">🚀 Mettre à jour le site</button>
    </div>

    <script>
        const API_URL = "https://ohaveitsion.github.io/Jerusalem/"; 

        function insertTag(startTag, endTag) {
            const textarea = document.getElementById('annonce_texte');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const text = textarea.value;
            textarea.value = text.substring(0, start) + startTag + text.substring(start, end) + endTag + text.substring(end);
            textarea.focus();
        }

        async function loadFromSheet() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                for (let key in data) {
                    const el = document.getElementById(key);
                    if (el) el.value = data[key];
                }
                alert("Données récupérées !");
            } catch (e) { alert("Erreur de connexion"); }
        }

        async function sendToSheet() {
            const fields = ['annonce_titre', 'annonce_texte', 'allumage_bougies', 'minha_vendredi', 'arvit_motsach'];
            const data = {};
            fields.forEach(f => {
                data[f] = document.getElementById(f).value;
            });

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify(data)
                });
                alert("Site mis à jour ! (Attends 30s pour le rafraîchissement)");
            } catch (e) { alert("Erreur d'envoi"); }
        }
    </script>
</body>
</html>
