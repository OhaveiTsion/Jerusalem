<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin - Ohavei Tsion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@400;600;700;800&display=swap');
        :root { --bg-deep-blue: #0f34a1; --gold-border: #f1c40f; --card-blue: rgba(255, 255, 255, 0.08); }
        
        body { 
            font-family: 'Assistant', sans-serif; 
            background-color: var(--bg-deep-blue); 
            color: white; padding: 10px; 
            display: flex; flex-direction: column; align-items: center; 
        }

        #floating-toolbar { 
            position: fixed; 
            top: 75px; 
            left: 50%; 
            transform: translateX(-50%); 
            display: none; 
            background: #1a1a1a; 
            padding: 8px 15px; 
            border-radius: 50px; 
            border: 2px solid var(--gold-border); 
            z-index: 9999; 
            gap: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        .admin-nav { position: sticky; top: 0; z-index: 2000; width: 100%; max-width: 500px; display: flex; gap: 10px; padding: 10px 0; background: var(--bg-deep-blue); }
        .main-container { border: 3px solid var(--gold-border); border-radius: 20px; padding: 15px; width: 100%; max-width: 500px; background: linear-gradient(to bottom, #0f34a1, #0a2472); position: relative; }
        
        .editable { 
            background: rgba(255,255,255,0.05); 
            border: 1px dashed rgba(255,255,255,0.2); 
            padding: 4px; border-radius: 6px; outline: none; min-height: 1.5em; 
            -webkit-user-select: text; user-select: text;
        }
        .editable:focus { background: rgba(255,255,255,0.15); border: 1px solid var(--gold-border); }

        .zman-box { background: white; border-radius: 12px; color: #0f34a1; padding: 10px 5px; text-align: center; }
        .annonce-card { background: var(--card-blue); border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 25px 15px 15px 15px; margin-bottom: 15px; position: relative; text-align: center; }
        .section-title { font-size: 1.25rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.2em; text-align: center; margin-bottom: 12px; display: flex; flex-direction: column; align-items: center; }
        .title-underline { width: 40px; height: 3px; background-color: var(--gold-border); margin-top: 4px; border-radius: 2px; }
        .row-major { display: flex; justify-content: space-between; align-items: center; padding: 10px 8px; }
        .shiour-item { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 6px 0; display: flex; justify-content: space-between; font-size: 0.85rem; }
        .section-card { border: 1px solid rgba(255,255,255,0.15); border-radius: 15px; padding: 15px; background: var(--card-blue); margin-bottom: 8px; }

        .f-btn { font-size: 0.75rem; background: #333; color: white; padding: 5px 12px; border-radius: 20px; border: none; cursor: pointer; font-weight: 700; }
        .editable b { font-weight: 900 !important; }
        .editable font[color="red"] { color: #ff4d4d !important; }
    </style>
</head>
<body>

    <div class="admin-nav">
        <button onclick="location.reload()" class="flex-1 bg-blue-500 text-white p-3 rounded-xl font-bold text-xs uppercase">🔄 Actualiser</button>
        <button onclick="sendData()" class="flex-[2] bg-green-500 text-white p-3 rounded-xl font-black text-lg uppercase shadow-lg">🚀 Envoyer</button>
    </div>

    <div id="floating-toolbar">
        <button class="f-btn" onmousedown="event.preventDefault(); document.execCommand('bold')">Gras</button>
        <button class="f-btn text-red-400" onmousedown="event.preventDefault(); document.execCommand('foreColor', false, '#ff4d4d')">Rouge</button>
        <button class="f-btn" onmousedown="event.preventDefault(); document.execCommand('removeFormat')">Normal</button>
    </div>

    <div class="main-container shadow-2xl">
        <div class="grid grid-cols-2 gap-3 mb-6">
            <div class="zman-box">
                <p class="text-[10px] opacity-60">Parasha</p>
                <div id="parasha_val" class="editable text-lg leading-tight mx-1" contenteditable="true"></div>
                <p id="auto-paracha-hint" class="text-[9px] italic opacity-40 mt-1"></p>
            </div>
            <div class="zman-box">
                <p id="allumage_bougies_label" class="editable text-[10px] mb-1 text-red-500" contenteditable="true">Allumage</p>
                <div id="allumage_bougies_val" class="editable text-2xl text-red-600 mx-2" contenteditable="true">--:--</div>
            </div>
        </div>

        <div class="annonce-card">
            <div id="annonce_titre_val" class="editable text-[0.75rem] italic opacity-60" contenteditable="true">TITRE</div>
            <div id="annonce_texte_val" class="editable text-xl mt-2" contenteditable="true">Annonce...</div>
        </div>

        <div class="section-card">
            <div class="section-title">SHABBAT<div class="title-underline"></div></div>
            <div class="space-y-1">
                <div class="row-major"><div id="minha_vendredi_label" class="editable text-sm" contenteditable="true">Minha Vendredi</div><div id="minha_vendredi_val" class="editable text-xl" contenteditable="true">--:--</div></div>
                <div class="row-major border-t border-white/10 pt-1"><div id="chaharit_shabbat_label" class="editable text-sm" contenteditable="true">Shaharit</div><div id="chaharit_shabbat_val" class="editable text-xl" contenteditable="true">--:--</div></div>
                
                <div class="bg-black/20 rounded-lg p-3 my-2 space-y-2 border border-white/5">
                    <div class="shiour-item"><div id="shiour_dan_label" class="editable italic text-xs" contenteditable="true">...</div><div id="shiour_dan_val" class="editable" contenteditable="true">--:--</div></div>
                    <div class="shiour-item"><div id="shiour_saadia_label" class="editable italic text-xs" contenteditable="true">...</div><div id="shiour_saadia_val" class="editable" contenteditable="true">--:--</div></div>
                    <div class="shiour-item"><div id="shiour_haviv_label" class="editable italic text-xs" contenteditable="true">...</div><div id="shiour_haviv_val" class="editable" contenteditable="true">--:--</div></div>
                    <div class="shiour-item border-none"><div id="shiour_guemara_label" class="editable italic text-xs" contenteditable="true">...</div><div id="shiour_guemara_val" class="editable" contenteditable="true">--:--</div></div>
                </div>

                <div class="row-major border-t border-white/10 pt-1"><div id="minha_shabbat_label" class="editable text-sm" contenteditable="true">Minha / Seouda</div><div id="minha_shabbat_val" class="editable text-xl" contenteditable="true">--:--</div></div>
                <div class="row-major border-t border-white/10 pt-1"><div id="arvit_motsach_label" class="editable text-sm" contenteditable="true">Arvit Motsae</div><div id="arvit_motsach_val" class="editable text-xl" contenteditable="true">--:--</div></div>
            </div>
        </div>

        <div class="section-card">
            <div class="section-title">SEMAINE<div class="title-underline"></div></div>
            <div class="space-y-1">
                <div class="row-major"><div id="chaharit_semaine_label" class="editable text-sm" contenteditable="true">Shaharit</div><div id="chaharit_semaine_val" class="editable text-xl" contenteditable="true">--:--</div></div>
                <div class="row-major border-t border-white/10 pt-1"><div id="minha_semaine_label" class="editable text-sm" contenteditable="true">Minha / Arvit</div><div id="minha_semaine_val" class="editable text-xl" contenteditable="true">--:--</div></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbz1LOWOKghLEUrOUSOFOEfyilc_X1T6tlFFqimWZj5IoLcS8lwYSdTAbT-w9TnkQ2L2/exec";
        const keys = ['allumage_bougies', 'minha_vendredi', 'chaharit_shabbat', 'shiour_dan', 'shiour_saadia', 'shiour_haviv', 'shiour_guemara', 'minha_shabbat', 'arvit_motsach', 'chaharit_semaine', 'minha_semaine', 'annonce_titre', 'annonce_texte', 'parasha'];

        const toolbar = document.getElementById('floating-toolbar');
        document.addEventListener('focusin', (e) => { if(e.target.classList.contains('editable')) toolbar.style.display = 'flex'; });
        document.addEventListener('focusout', () => { setTimeout(() => { if (!document.activeElement.classList.contains('editable')) toolbar.style.display = 'none'; }, 300); });

        function htmlToTags(html) {
            if(!html) return "";
            return html.replace(/<b>(.*?)<\/b>/gi, "**$1**").replace(/<font color="(.*?)">(.*?)<\/font>/gi, "{r}$2{/r}").replace(/<br>|<div>/gi, "\n").replace(/<\/div>|&nbsp;/g, " ").trim();
        }

        function tagsToHtml(tags) {
            if(!tags) return "";
            return tags.replace(/\*\*(.*?)\*\*/g, "<b>$1</b>").replace(/\{r\}(.*?)\{\/r\}/g, '<font color="red">$1</font>').replace(/\n/g, "<br>");
        }

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                
                keys.forEach(k => {
                    const lEl = document.getElementById(`${k}_label`), vEl = document.getElementById(`${k}_val`);
                    if(lEl && data[k]) lEl.innerHTML = tagsToHtml(data[k].intitule);
                    if(vEl && data[k]) vEl.innerHTML = tagsToHtml(data[k].valeur);
                });

                // --- LOGIQUE PARASHA AUTO ---
                const hRes = await fetch('https://www.hebcal.com/shabbat?cfg=json&city=IL-Jerusalem&lg=s');
                const hData = await hRes.json();
                const p = hData.items.find(i => i.category === "parashat");
                
                if(p) {
                    const nameAuto = p.title.replace("Parashat ","");
                    const pEl = document.getElementById('parasha_val');
                    const currentVal = pEl.innerHTML.trim();
                    
                    // Si le champ est vide ou contient des tirets, on force le nom auto en gras
                    if (currentVal === "" || currentVal === "--" || currentVal === "<div><br></div>") {
                        pEl.innerHTML = `<b>${nameAuto}</b>`; 
                    }
                    document.getElementById('auto-paracha-hint').innerText = "Suggéré : " + nameAuto;
                }
            } catch(e) {}
        }

        async function sendData() {
            const pass = prompt("Mot de passe :");
            if(!pass) return;
            const payload = {};
            keys.forEach(k => {
                const lEl = document.getElementById(`${k}_label`), vEl = document.getElementById(`${k}_val`);
                payload[k] = { intitule: lEl ? htmlToTags(lEl.innerHTML) : k, valeur: vEl ? htmlToTags(vEl.innerHTML) : "" };
            });
            try {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ auth: pass, payload: payload }) });
                const result = await response.text();
                alert(result.includes("Succès") ? "🚀 Envoyé !" : "Erreur : " + result);
            } catch(e) { alert("Erreur réseau"); }
        }
        window.onload = loadData;
    </script>
</body>
</html>
